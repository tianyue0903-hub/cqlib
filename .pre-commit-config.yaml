fail_fast: false
repos:
  # 1. Basic file checks (general)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1024'] # Prevent files larger than 1 MB from being committed

  # 2. Rust checks (core and bindings)
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: Rust Fmt
        description: Format Rust code
      - id: cargo-check
        name: Cargo Check
        description: Check for compilation errors
      - id: clippy
        name: Cargo Clippy
        description: Lint Rust code
        args: ["--", "-D", "warnings"] # Treat warnings as errors

  # 3. Python checks (binding-python)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  # 4. C/C++ formatting
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        types_or: [c++, c]

  # 5. Spell checking (prevent API spelling mistakes)
  - repo: https://github.com/crate-ci/typos
    rev: v1.47.2
    hooks:
      - id: typos
        # Exclude files that do not need spell checking
        exclude: |
            (?x)^(
                .*\.lock|
                .*\.svg|
                .*\.ipynb
            )$
