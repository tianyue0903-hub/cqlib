[workspace]
members = [
    "crates/cqlib-core",
    "crates/binding-python",
    "crates/binding-cpp",
    "crates/cqlib",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
license-file = "LICENSE.txt"

[profile.release]
lto = true
codegen-units = 1
strip = true

[workspace.dependencies]
ndarray = "0.17.1"
num = "0.4.3"
num-complex = "0.4.6"
